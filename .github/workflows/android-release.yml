name: Rock Wallpapers HD Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 3.7.0)'
        required: true

env:
  REGISTRY: ghcr.io
  GRADLE_VERSION: "8.7"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 📌 Parse version from tag or input
      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION (expected: X.Y.Z)"
            exit 1
          fi
          
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          # versionCode = (MAJOR * 10000) + (MINOR * 100) + PATCH
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "✅ Release version: $VERSION (code: $VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # ✅ Validate Gradle Wrapper (correct method)
      - name: Validate Gradle Wrapper
        run: |
          if [ ! -x ./gradlew ]; then
            echo "❌ Gradle wrapper not executable"
            exit 1
          fi
          ./gradlew --version
          echo "✅ Gradle wrapper validated"

      # 🔐 Decode and Setup Keystore
      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          
          # Decode and verify keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/release.jks"
          
          if [ ! -f "${{ runner.temp }}/release.jks" ]; then
            echo "❌ Failed to decode keystore"
            exit 1
          fi
          
          # Store path for gradle
          echo "KEYSTORE_PATH=${{ runner.temp }}/release.jks" >> $GITHUB_ENV
          echo "STORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
          KEY_ALIAS_ENV="$KEY_ALIAS" >> $GITHUB_ENV
          
          echo "✅ Keystore ready at ${{ runner.temp }}/release.jks"

      # 📦 Build Release APK with proper signing config
      - name: Build Release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version }}
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          ./gradlew clean assembleRelease \
            -PversionCode=$VERSION_CODE \
            -PversionName=$VERSION_NAME \
            --stacktrace \
            --info

      # ✅ Verify APK was created
      - name: Verify APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found after build"
            exit 1
          fi
          
          APK_SIZE=$(ls -lh "$APK_PATH" | awk '{print $5}')
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "✅ APK created: $APK_PATH ($APK_SIZE)"

      # 📛 Rename APK to version
      - name: Rename APK
        run: |
          mkdir -p output
          SOURCE_APK="${{ steps.apk.outputs.apk_path }}"
          FINAL_NAME="Rock-Wallpapers-HD-v${{ steps.version.outputs.version }}.apk"
          
          cp "$SOURCE_APK" "output/$FINAL_NAME"
          
          if [ ! -f "output/$FINAL_NAME" ]; then
            echo "❌ Failed to copy APK"
            exit 1
          fi
          
          echo "✅ APK renamed to: $FINAL_NAME"
          ls -lh output/

      # ✅ Verify APK signature
      - name: Verify APK Signature
        run: |
          APK_PATH="output/Rock-Wallpapers-HD-v${{ steps.version.outputs.version }}.apk"
          
          if jarsigner -verify -verbose "$APK_PATH" 2>&1 | grep -q "jar verified"; then
            echo "✅ APK signature verified"
          else
            echo "⚠️  Signature verification output:"
            jarsigner -verify "$APK_PATH" || true
          fi

      # 📤 Upload as artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rock-Wallpapers-HD-v${{ steps.version.outputs.version }}
          path: output/*.apk
          retention-days: 30

      # 🚀 Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Rock Wallpapers HD v${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}
            
            - **Version Code**: ${{ steps.version.outputs.version_code }}
            - **Release Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            
            ### Installation
            1. Download the APK
            2. Enable "Unknown Sources" in settings
            3. Install the APK
            
            ### Changes
            See commit history for detailed changes.
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📧 Notify on failure
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Release failed. Check logs above for details."
          exit 1

  # Optional: Post-release verification
  verify:
    needs: release
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify Release
        run: |
          TOTAL_SIZE=$(du -sh artifacts | cut -f1)
          APK_COUNT=$(find artifacts -name "*.apk" | wc -l)
          
          echo "📊 Release Summary:"
          echo "  - APKs: $APK_COUNT"
          echo "  - Total size: $TOTAL_SIZE"
          echo "✅ Release verification complete"
