name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROIDKEYSTOREBASE64 || secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROIDKEYALIAS || secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROIDKEYSTOREPASSWORD || secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROIDKEYPASSWORD || secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          # Dynamically extract tag name (e.g. v3.5.0)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Find the signed release APK first, or fall back to any built APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*-signed.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          fi
          
          cp "$APK_PATH" "Rock-Wallpapers-HD-$TAG_NAME.apk"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: Rock-Wallpapers-HD-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
