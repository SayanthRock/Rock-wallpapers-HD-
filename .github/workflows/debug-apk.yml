name: Debug APK CI (Auto Versioned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version info
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_NUM=${{ github.run_number }}
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUM" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          cp "$APK_PATH" "app-debug-${{ steps.vars.outputs.build }}-${{ steps.vars.outputs.sha }}.apk"

      - name: Upload Versioned APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ steps.vars.outputs.build }}-${{ steps.vars.outputs.sha }}
          path: app-debug-*.apk
