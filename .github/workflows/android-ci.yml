name: Rock Wallpapers HD Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # 🔐 Decode Keystore safely
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # 📦 Build Release APK
      - name: Build Release APK
        run: ./gradlew clean assembleRelease

      # 📍 Locate APK
      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK found!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      # ✍️ Sign APK (FIXED - correct way)
      - name: Sign APK
        run: |
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            "${{ steps.apk.outputs.apk_path }}" \
            "${{ secrets.KEY_ALIAS }}"

      # 📛 Rename APK
      - name: Rename APK
        run: |
          mkdir output
          cp "${{ steps.apk.outputs.apk_path }}" output/
          mv output/*.apk output/Rock-Wallpapers-HD-v3.5.0.apk

      # 📤 Upload artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rock-Wallpapers-HD
          path: output/*.apk

      # 🚀 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.5.0
          name: Rock Wallpapers HD v3.5.0
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
