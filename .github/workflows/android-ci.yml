name: Android CI (Dev / Beta / Signed Stable)

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      track:
        description: "Build track"
        required: true
        default: "beta"
        type: choice
        options:
          - dev
          - beta
          - stable

  release:
    types: [published]

env:
  GRADLE_OPTS: "-Djava.net.preferIPv4Stack=true"
  VERSION_CODE: ${{ github.run_number }}
  VERSION_NAME: 1.0.${{ github.run_number }}-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ----------------------------
      # Decode Keystore (only for stable)
      # ----------------------------
      - name: Decode Keystore
        if: github.event_name == 'release' || github.event.inputs.track == 'stable'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      # ----------------------------
      # Decide track
      # ----------------------------
      - name: Set track
        id: track
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "track=dev" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "track=stable" >> $GITHUB_OUTPUT
          else
            echo "track=${{ github.event.inputs.track }}" >> $GITHUB_OUTPUT
          fi

      # ----------------------------
      # Build APK (Debug or Release)
      # ----------------------------
      - name: Build APK
        run: |
          if [ "${{ steps.track.outputs.track }}" = "stable" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      # ----------------------------
      # Sign APK (only stable)
      # ----------------------------
      - name: Sign Release APK
        if: steps.track.outputs.track == 'stable'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ----------------------------
      # Versioning
      # ----------------------------
      - name: Version Info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_NUM=${{ github.run_number }}
          TRACK=${{ steps.track.outputs.track }}

          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "track=$TRACK" >> $GITHUB_OUTPUT

      # ----------------------------
      # Rename APK
      # ----------------------------
      - name: Rename APK
        run: |
          if [ "${{ steps.version.outputs.track }}" = "stable" ]; then
            APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          else
            APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          fi

          cp "$APK_PATH" "app-${{ steps.version.outputs.track }}-${{ steps.version.outputs.build }}-${{ steps.version.outputs.sha }}.apk"

      # ----------------------------
      # Upload artifact
      # ----------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.track }}-${{ steps.version.outputs.build }}
          path: app-*.apk
