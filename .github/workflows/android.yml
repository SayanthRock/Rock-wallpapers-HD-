name: Android CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GRADLE_OPTS: "-Djava.net.preferIPv4Stack=true"
      SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 1.5. Find Project Directory and grant execute permission for gradlew
      - name: Determine Project Directory
        run: |
          SETTINGS_PATH=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" | head -n 1)
          if [ -z "$SETTINGS_PATH" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
            chmod +x gradlew || echo "gradlew not found in root"
          else
            DIR=$(dirname "$SETTINGS_PATH")
            DIR="${DIR#./}"
            if [ -z "$DIR" ] || [ "$DIR" = "." ]; then
              DIR="."
            fi
            echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
            chmod +x "$DIR/gradlew" || echo "gradlew not found in $DIR"
          fi

      # 2. Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 2.3. Enable caching to reduce dependency downloads
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 2.5. Diagnose Network and Pre-verify Gradle Setup (with retry)
      - name: Diagnose and Pre-verify Gradle Network
        run: |
          echo "Testing DNS and Connectivity to Gradle Services..."
          for i in 1 2 3; do
            echo "Attempt $i to connect to services.gradle.org..."
            curl -I -s --connect-timeout 10 https://services.gradle.org/distributions/ && echo "Successfully accessed Gradle servers!" && break || (echo "Failed to connect, retrying in 10 seconds..." && sleep 10)
          done

      # 3. Setup Gradle with caching and wrapper validation (with continue-on-error to survive transient failures)
      - name: Setup Gradle
        id: setup_gradle
        uses: gradle/actions/setup-gradle@v3
        continue-on-error: true
        with:
          cache-read-only: false
          validate-wrappers: true
          build-root-directory: ${{ env.PROJECT_DIR }}

      # 3.5. Retry Gradle setup if the previous step failed
      - name: Retry Gradle Setup
        if: steps.setup_gradle.outcome == 'failure'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "Previous setup step failed; attempting raw gradlew tasks call with network retries..."
          for i in 1 2 3; do
            echo "Gradle Tasks recovery attempt $i..."
            ./gradlew tasks --no-daemon && break || (echo "Tasks call failed, retrying in 15 seconds..." && sleep 15)
          done

      # 5. Build Debug APK (with dependency retry protection)
      - name: Build Debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          for i in 1 2 3; do
            echo "Build attempt $i..."
            ./gradlew assembleDebug --no-daemon && break || (echo "Build failed or network timed out, retrying in 15 seconds..." && sleep 15)
          done

      # 6. Run Unit Tests (with retry protection)
      - name: Run Tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          for i in 1 2 3; do
            echo "Testing attempt $i..."
            ./gradlew test --no-daemon && break || (echo "Tests failed, retrying in 15 seconds..." && sleep 15)
          done

      # 7. Upload built APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk

      # 8. Decode Keystore
      - name: Decode Keystore
        if: env.SIGNING_KEYSTORE != ''
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode > release-key.jks
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

      # 9. Build Release APK & Bundle
      - name: Build Release APK & Bundle
        if: env.SIGNING_KEYSTORE != ''
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: release-key.jks
          STORE_PASSWORD: ${{ secrets.SIGNINGKEYSTOREPASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNINGKEYALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNINGKEYPASSWORD }}
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

      # 9.5 Upload Release Artifacts
      - name: Upload Release Artifacts
        if: env.SIGNING_KEYSTORE != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
            ${{ env.PROJECT_DIR }}/app/build/outputs/bundle/release/*.aab
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

      # 10. Create GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGNING_KEYSTORE != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
            ${{ env.PROJECT_DIR }}/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

