version: 2
updates:
  # Maintain dependencies for Gradle
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      gradle-dependencies:
        applies-to: security-updates
        patterns:
          - "androidx.*"
          - "com.google.*"
          - "org.jetbrains.kotlin.*"
